services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-puduvandi}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    volumes:
      - puduvandi_pgdata:/var/lib/postgresql/data
    ports:
      # Host side is 5433, not 5432 — this machine already has a native
      # Postgres bound to 5432, and this container needs its own port to
      # avoid colliding with it. The app talks to it as postgres:5432
      # *inside* the Docker network either way, so this only affects how
      # you connect to it from your host machine (e.g. via psql/DBeaver).
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-puduvandi}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-puduvandi}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env — generate with: openssl rand -base64 48}
      PUDUVANDI_ENV: ${PUDUVANDI_ENV:-staging}
      OTP_MOCK_ENABLED: ${OTP_MOCK_ENABLED:-true}
      OTP_MOCK_VALUE: ${OTP_MOCK_VALUE:-123456}
      PAYMENT_MOCK_ENABLED: ${PAYMENT_MOCK_ENABLED:-true}
      PAYMENT_EXPIRY_MINUTES: ${PAYMENT_EXPIRY_MINUTES:-15}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
    ports:
      - "8080:8080"
    volumes:
      - puduvandi_uploads:/app/uploads

volumes:
  puduvandi_pgdata:
  puduvandi_uploads:
